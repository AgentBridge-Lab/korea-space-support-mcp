name: verify-space

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: verify-space-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run verify:space (check + tests + typecheck + build)
        run: npm run verify:space
        env:
          CI: 'true'
          # ingest:space is intentionally NOT run in CI — it depends on
          # live .go.kr sources and Python deps (curl_cffi, olefile, pdftotext).
          # CI verifies the committed dataset, tests, types, and full build.
